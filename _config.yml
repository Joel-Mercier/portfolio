# Build settings
markdown: kramdown
highlighter: pygments
destination : _site/
exclude: ['node_modules', 'package.json', 'gulpfile.js', 'Gemfile', 'Gemfile.lock', 'sources', 'README.md', 'composer.json', 'composer.lock']
permalink: /:categories/:title/
paginate: 6
paginate_path: /blog/page:num
languages: ["fr", "en"]
excerpt_separator: "<!--split-->"
# exclude_from_localizations: ["img", "js", "css"]
collections:
  portfolio:
    permalink: /works/:title/
    output: true
  work_experiences:
    output: false
