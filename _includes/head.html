<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title | append: ' | Portfolio de Joel Mercier' |escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | append: " | " |append: site.title }}{% else %}{{ site.description }}{% endif %}">

  {% if page.layout == 'post' %}
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="{{ page.url | prepend: site.baseurl | prepend: site.url }}" />
    <meta property="og:image" content="{{ page.cover-img | prepend: "/img/blog/" | prepend: site.baseurl | prepend: site.url }}" />
  {% endif %}

  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:url" content="{{ site.url append: site.baseurl }}" />
  <meta property="og:image" content="{{ "android-chrome-192x192.png" | prepend: "/img/icons/" | prepend: site.baseurl | prepend: site.url }}" />
  <meta name="theme-color" content="{{ site.main_color }}">
  <style>
    @charset "UTF-8";html{font-family:sans-serif;-ms-text-size-adjust:100%;-webkit-text-size-adjust:100%}body{margin:0}svg:not(:root){overflow:hidden}button{font:inherit;margin:0}button{overflow:visible}button{text-transform:none}button{-webkit-appearance:button}button::-moz-focus-inner{border-style:none;padding:0}button:-moz-focusring{outline:1px dotted ButtonText}::-webkit-input-placeholder{color:inherit;opacity:.54}::-webkit-file-upload-button{-webkit-appearance:button;font:inherit}html{box-sizing:border-box}*{box-sizing:inherit}html{font-size:62.5%;font-size:.625em}body{font-size:1.8rem;background-color:#fdfdfd;color:#2b2b2b;font-family:Open Sans,Helvetica,Arial,sans-serif;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word}svg{max-width:100%}body>script{display:none!important}button{font-family:inherit;font-size:inherit}button{color:#2b2b2b}::-webkit-input-placeholder{color:#777}.nav-mobile__show{position:fixed;top:2rem;left:2rem;background:linear-gradient(135deg,#eb6361,#673a5d);border:none;border-radius:50%;width:56px;height:56px;-webkit-transform:scaleX(-1);transform:scaleX(-1);z-index:6}.nav-mobile__show svg{display:block;width:80%;margin:auto}@media (min-width:961px){.nav-mobile__show{display:none}}@font-face{font-family:'Open Sans';font-style:normal;font-weight:300;src:local('Open Sans Light'),local('OpenSans-Light'),url(https://fonts.gstatic.com/s/opensans/v14/DXI1ORHCpsQm3Vp6mXoaTYnF5uFdDttMLvmWuJdhhgs.ttf) format('truetype')}@font-face{font-family:'Open Sans';font-style:normal;font-weight:400;src:local('Open Sans Regular'),local('OpenSans-Regular'),url(https://fonts.gstatic.com/s/opensans/v14/cJZKeOuBrn4kERxqtaUH3aCWcynf_cDxXwCLxiixG1c.ttf) format('truetype')}@font-face{font-family:'Open Sans';font-style:normal;font-weight:700;src:local('Open Sans Bold'),local('OpenSans-Bold'),url(https://fonts.gstatic.com/s/opensans/v14/k3k702ZOKiLJc3WVjuplzInF5uFdDttMLvmWuJdhhgs.ttf) format('truetype')}
  </style>
  <!-- <link rel="stylesheet" href="{{ "/css/main.min.css" | prepend: site.baseurl }}"> -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Open+Sans:300,400,700" rel="stylesheet">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}">
  <link rel="manifest" href="{{ "/manifest.json" | prepend: site.baseurl }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{"/img/icons/apple-touch-icon.png" | prepend: site.baseurl }}">
  <link rel="icon" type="image/png" href="{{"/img/icons/favicon-32x32.png" | prepend: site.baseurl }}" sizes="32x32">
  <link rel="icon" type="image/png" href="{{"/img/icons/favicon-16x16.png" | prepend: site.baseurl }}" sizes="16x16">
  <link rel="mask-icon" href="{{"/img/icons/safari-pinned-tab.svg" | prepend: site.baseurl }}" color="#eb6361">
  <link rel="shortcut icon" href="{{"/img/icons/favicon.ico" | prepend: site.baseurl }}">
  <meta name="msapplication-config" content="{{"/img/icons/browserconfig.xml" | prepend: site.baseurl }}">
</head>
