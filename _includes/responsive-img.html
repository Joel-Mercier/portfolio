<picture class="{{ include.class }}">

  <source srcset="/img/blog/{{ include.img1x }} 1x, /img/blog/{{ include.img2x }} 2x">
  <img src="/img/blog/{{ include.img1x }}" alt="{{ include.alt }}">
</picture>
